<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numb Crypto Trading World</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050810;
      color:white;
      font-family:Arial, sans-serif;
      padding:40px;
    }

    h1{
      font-size:48px;
      margin-bottom:10px;
    }

    p{
      color:#9aa4b2;
      margin-bottom:40px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
    }

    .card{
      background:#0d1a2a;
      border:1px solid #1f3a55;
      border-radius:12px;
      padding:25px;
      text-decoration:none;
      color:white;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#00ffae;
    }

    .card h2{
      margin-bottom:10px;
      color:#00ffae;
    }

    .card p{
      margin-bottom:0;
      color:#b8c2cc;
      line-height:1.5;
    }
  </style>
</head>

<body>

  <h1>Numb Crypto Trading World</h1>

  <p>
    Select a strategy below
  </p>

  <div class="grid">

    <a href="liquidity-scanner.html" class="card">
      <h2>Liquidity Scanner</h2>
      <p>
        SMC liquidity sweep and FVG scanner.
      </p>
    </a>

    <a href="range-pa.html" class="card">
      <h2>Range & Price Action</h2>
      <p>
        Range trading and mean reversion scanner.
      </p>
    </a>

    <a href="smc-confluence.html" class="card">
      <h2>SMC Confluence</h2>
      <p>
        Multi timeframe smart money confluence scanner.
      </p>
    </a>

    <a href="breakout-scanner.html" class="card">
      <h2>Breakout Scanner</h2>
      <p>
        EMA + breakout + liquidity sweep setups.
      </p>
    </a>

  </div>

</body>
</html>
